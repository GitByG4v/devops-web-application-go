<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Store | Courses</title>
  <style>
    :root { --bg:#fff; --surface:#fefefe; --text:#2b2b2b; --muted:#555; --primary:#2c6fbb; }
    * { box-sizing:border-box; }
    body { margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#f0f3f7;color:var(--text); }
    header, footer{background:var(--primary);color:#fff;}
    header{padding:14px 16px;}
    footer{padding:12px 16px;text-align:center;font-size:.9rem;}
    nav{display:flex;justify-content:center;gap:12px;}
    nav a{color:#fff;text-decoration:none;padding:6px 10px;border-radius:5px;}
    nav a:hover{background:rgba(255,255,255,.18);}
    main{width:min(93%,900px);margin:20px auto;}
    h1{margin-bottom:12px;}
    .card{background:var(--surface);border-radius:10px;padding:18px;margin-bottom:14px;border:1px solid #e6e9ef;box-shadow:0 2px 8px rgba(25,35,55,.06);}
    h2{margin-top:0;}
    p{color:var(--muted);line-height:1.6;}
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/books">Books</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/courses">Courses</a>
    </nav>
  </header>
  <main>
    <h1>Short learning paths</h1>
    <div class="card">
      <h2>Reading Roadmaps</h2>
      <p>Three-book routes for a topic (coding, leadership, mindfulness). Not a course, just curated reading.</p>
    </div>
    <div class="card">
      <h2>Book club notes</h2>
      <p>Each month I pick one book and share a few key notes. Simple, low-pressure, no signups.</p>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 Book Store</p>
  </footer>
</body>
</html>
